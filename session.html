<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Decision Engine - Create or Join a Session</title>
    </head>
    <body>
        <header>
            <h1>Decision Engine</h1>
            <nav>
                <a href="index.html">Exit</a>
            </nav>
        </header>
        <main>
            <h2>Create or Join a Session</h2>
            <h3>Create a New Session</h3>
            <button onclick="location.href='options.html';">Create Session</button>
            <p>Session Code: <span id = "session-code">[Generated Code will appear]</span></p>
            <form action="options.html" method="POST">
                <input type="hidden" id="session-name" name = "session-name">
                <button type="submit" id="start-session" disabled>Start Session</button>
            </form>


            <h3>Join an Existing Session</h3>
            <form action="options.html" method="POST">
                <label for="join-code">Enter Session Code:</label>
                <input type="text" id="join-code" name="join-code" placeholder="Enter Session Code" required>
                <button onclick="location.href='options.html';">Join Session</button>
            </form>
        </main>
    </body>
</html>
