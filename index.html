<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decision Engine - Login</title>
</head>
<body>
    <header>
        <h1>Decision Engine</h1>
    </header>
    <main>
        <h2>Login</h2>
        <p><strong>Note:</strong> This login button will take you write to the next page for now.</p>
        <form action="session.html" method="GET">
            <label for="username">Username:</label>
            <input type="text" id="username" name="username" required>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>
            <button type="submit">Login</button>
        </form>
        <p>New user? <button type="submit">Sign Up</button></p>
        <a href="https://github.com/PriyaMerrill/startup.git" target="_blank">
            View Project on GitHub
        </a>
    </main>
</body>
